services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: resume_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: resume
      POSTGRES_DB: resume
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume -d resume"]
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase:
    image: liquibase/liquibase:latest
    container_name: resume_liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./database:/liquibase/changelog
      - ./docker/liquibase.properties:/liquibase/liquibase.properties
      - ./docker/drivers/postgresql-42.7.10.jar:/liquibase/lib/postgresql.jar
    entrypoint: ["liquibase"]
    command:
      - --defaultsFile=/liquibase/liquibase.properties
      - --context=local
      - update

volumes:
  postgres_data:
